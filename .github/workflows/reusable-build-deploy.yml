name: Backend Build And Deploy

on:
  workflow_run:
    workflows: ["CI Tests"]
    types:
      - completed
    branches:
      - main
  workflow_call:
    inputs:
      image_name:
        description: Docker image name to build and push
        required: false
        type: string
        default: seating-generator-backend

permissions:
  contents: read

env:
  REGISTRY_HOST: registry.mafbase.ru
  SSH_KEY_PATH: /opt/ci-secrets/deploy_id_ed25519

jobs:
  build-image:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image name
        run: echo "IMAGE_NAME=${INPUT_IMAGE_NAME:-seating-generator-backend}" >> "$GITHUB_ENV"
        env:
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}

      - name: Validate runner variables
        run: |
          test -n "$REGISTRY_USER" || (echo "REGISTRY_USER is not set on runner" && exit 1)
          test -n "$REGISTRY_PASSWORD" || (echo "REGISTRY_PASSWORD is not set on runner" && exit 1)

      - name: Log in to registry
        run: echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin

      - name: Build image
        run: docker build --no-cache -t "$REGISTRY_HOST/$IMAGE_NAME:latest" .

      - name: Push image
        run: docker push "$REGISTRY_HOST/$IMAGE_NAME:latest"

  deploy-image:
    runs-on: [self-hosted, linux]
    needs: [build-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate runner variables
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is not set on runner" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is not set on runner" && exit 1)
          test -f "$SSH_KEY_PATH" || (echo "SSH_KEY_PATH file is missing: $SSH_KEY_PATH" && exit 1)

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cp "$SSH_KEY_PATH" ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy docker-compose
        if: github.repository == 'Mafbase/mafbase-backend'
        run: scp docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST":~/

      - name: Restart service
        run: ssh "$DEPLOY_USER@$DEPLOY_HOST" "./restart.sh"
