name: 'Claude Interactive'
description: 'Composite action for interactive @claude in issues/PRs'

inputs:
  allowed_tools:
    description: 'Additional allowed tools beyond base set (e.g. "Bash(flutter *)" "Bash(dart *)")'
    required: true
  system_prompt:
    description: 'Additional system prompt for Claude'
    required: false
    default: ''
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install GitHub CLI
      shell: bash
      run: |
        command -v gh >/dev/null 2>&1 || brew install gh
        gh --version

    - name: Run Claude Code
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        path_to_claude_code_executable: claude
        show_full_output: true
        additional_permissions: |
          actions: read
        claude_args: >-
          ${{ inputs.system_prompt != '' && format('--append-system-prompt "{0}"', inputs.system_prompt) || '' }}
          --allowedTools "Skill" "Read" "Glob" "Grep" "WebFetch(*)" ${{ inputs.allowed_tools }}
