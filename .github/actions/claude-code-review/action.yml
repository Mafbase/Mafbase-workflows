name: 'Claude Code Review'
description: 'Composite action for automated Claude code review on PRs'

inputs:
  allowed_tools:
    description: 'Additional allowed tools beyond base set (e.g. "Bash(flutter analyze:*)")'
    required: false
    default: ''
  system_prompt:
    description: 'Additional system prompt prepended to review command'
    required: false
    default: ''
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install GitHub CLI
      shell: bash
      run: |
        command -v gh >/dev/null 2>&1 || brew install gh
        gh --version

    - name: Run Claude Code Review
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        path_to_claude_code_executable: claude
        show_full_output: true
        allowed_bots: '*'
        plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
        plugins: 'code-review@claude-code-plugins'
        claude_args: >-
          ${{ inputs.allowed_tools != '' && format('--allowedTools "Skill" Bash(git submodule *) Bash(gh pr view:*)" "Bash(gh pr diff:*)" "Bash(gh api:*)" "Bash(gh pr comment:*)" {0}', inputs.allowed_tools) || '--allowedTools "Skill" Bash(gh pr view:*)" Bash(git submodule *) "Bash(gh pr diff:*)" "Bash(gh api:*)" "Bash(gh pr comment:*)"' }}
        prompt: |
          ${{ inputs.system_prompt != '' && inputs.system_prompt || '' }}
          /code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
